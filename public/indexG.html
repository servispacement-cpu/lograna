<html>
    <head>
        <title>Gestionnaire de cookies</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <h1>Gestion du commerce Lograna :</h1>
        </div>
        <div>
            <h1>Créer un cookie :</h1>
            <form>
                <label>Entrez le nom du cookie :</label><input type="text" id="Ncookie"><br><br>
                <label>Entrez la description du cookie :</label><input type="text" id="descCookie"><br><br>
                <label>Entrez le prix du cookie :</label><input type="number" id="pCookie"><br><br>
                <label>Sélectionnez la classe du cookie :</label><select id="cat">
                    <option value="classique">Cookies classique</option>
                    <option value="sans_pépite">Cookies sans pépites</option>
                    <option value="sans_pate">Cookies sans pâte</option>
                    <option value="gourmands">Cookies gourmands</option>
                </select><br><br>
                <label id="labvid">Prenez une photo du cookie (facultatifs):</label>
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas"> </canvas>
                <button type="button" onclick="photo()">Prendre une photo</button> <br><br>
                <button onclick="createCookie(event)">Créer le cookie avec photo</button><br><br>
                <button onclick="createCookier(event)">Créer le cookie sans photo</button><br><br>
            </form>
        </div>
        <div id="par">
            <h1>Reservations :</h1>
        </div>
        <div id="masq">
            <h1>Masquer un cookie dans l'interface client :</h1><br><br>
            <form>
                <select id="selmas"></select><br><br>
                <button onclick="masquerCookie()" type="button">Masquer le cookie</button><br><br>
                <select id="seldmas"></select><br><br>
                <button onclick="demasquerCookie()" type="button">Démasquer le cookie</button>
            </form>
        </div>

    
    <script src="scriptG.js"></script>
    </body>
</html>
